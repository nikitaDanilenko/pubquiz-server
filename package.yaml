name:                pubquiz-server
version:             0.1.0.0
github:              "nikitaDanilenko/pubquiz-server"
license:             BSD3
author:              "Nikita Danilenko"
maintainer:          "nikita.danilenko.is@gmail.com"
copyright:           "2020 Nikita Danilenko"

extra-source-files:
- Readme.md
- ChangeLog.md

# Metadata used when publishing your package
synopsis:            Host server for pub quiz application.
category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/pubquiz-server-stack#readme>

dependencies:
- base
- bytestring
- containers
- snap
- text
- snap-server
- snap-core
- snap-loader-static
- lens
- filepath
- cryptonite
- process >= 1 && < 2
- random
#- split >= 0.2 && < 1
##- parsec >= 3.1 && < 4
- extra
#- colour >= 2.1 && < 3
- HaTeX >= 3 && < 4
- persistent
- persistent-postgresql
- persistent-template
- monad-logger
- time
- path-pieces
- transformers
- resourcet
- aeson
- case-insensitive
- elm-bridge
- http-types
- blaze-builder
- directory
- modern-uri
- qrcode-core
- qrcode-juicypixels
- JuicyPixels
- base64-bytestring
- either
#- heist
#- map-syntax


library:
  source-dirs: src

executables:
  pubquiz-server-exe:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - pubquiz-server
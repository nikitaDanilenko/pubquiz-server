name:                pubquiz-server
version:             0.1.0.0
github:              "nikitaDanilenko/pubquiz-server"
license:             BSD3
author:              "Nikita Danilenko"
maintainer:          "nikita.danilenko.is@gmail.com"
copyright:           "2026 Nikita Danilenko"

extra-source-files:
- Readme.md

# Metadata used when publishing your package
synopsis:            Host server for pub quiz application.
category:            Web

description:         Please see the README on GitHub at <https://github.com/nikitaDanilenko/pubquiz-server#readme>

dependencies:
- base
- bytestring
- containers
- snap
- text
- snap-server
- snap-core
- snap-loader-static
- lens
- filepath
- cryptonite
- process >= 1 && < 2
- random
- extra
- HaTeX >= 3 && < 4
- persistent
- persistent-postgresql
- persistent-template
- monad-logger
- time
- path-pieces
- transformers
- resourcet
- aeson
- case-insensitive
- elm-bridge
- http-types
- blaze-builder
- directory
- modern-uri
- qrcode-core
- qrcode-juicypixels
- JuicyPixels
- base64-bytestring
- either

library:
  source-dirs: src

executables:
  pubquiz-server-exe:
    main:                Main.hs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
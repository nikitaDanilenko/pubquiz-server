name: pubquiz-server
version: 0.1.0.0
github: "nikitaDanilenko/pubquiz-server"
license: BSD3
author: "Nikita Danilenko"
maintainer: "nikita.danilenko.is@gmail.com"
copyright: "2026 Nikita Danilenko"

extra-source-files:
  - Readme.md

# Metadata used when publishing your package
synopsis: Host server for pub quiz application.
category: Web

description: Please see the README on GitHub at <https://github.com/nikitaDanilenko/pubquiz-server#readme>

# Generate .hie files for better HLS navigation
ghc-options:
  - -fwrite-ide-info
  - -hiedir=.hie

dependencies:
  - base
  - dhall
  - text
  - transformers

library:
  source-dirs: src

executables:
  pubquiz-server-exe:
    main: Main.hs
    source-dirs: src
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N

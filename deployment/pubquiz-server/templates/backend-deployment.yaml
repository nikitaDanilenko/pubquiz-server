apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "pubquiz-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "pubquiz-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pubquiz-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: SERVER_PATH
              value: {{ .Values.config.serverPath | quote }}
            - name: DATABASE_HOST
              value: {{ include "pubquiz-server.databaseHost" . | quote }}
            - name: DATABASE_PORT
              value: {{ .Values.database.port | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.database.name | quote }}
            - name: DATABASE_USER
              value: {{ .Values.database.user | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: database-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: jwt-secret
            - name: JWT_EXPIRATION_SECONDS
              value: {{ .Values.jwt.expirationSeconds | quote }}
            - name: ORGANIZER_ADMIN_NAME
              value: {{ .Values.organizers.admin.name | quote }}
            - name: ORGANIZER_ADMIN_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: organizer-admin-hash
            - name: ORGANIZER_USER_NAME
              value: {{ .Values.organizers.user.name | quote }}
            - name: ORGANIZER_USER_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secretName }}
                  key: organizer-user-hash
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /public
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /public
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

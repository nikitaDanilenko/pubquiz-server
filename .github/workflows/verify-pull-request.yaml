name: Verify Pull Request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  check_paths:
    name: Check Changed Paths
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.paths.outputs.src }}
      deployment-changed: ${{ steps.paths.outputs.deployment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: paths
        with:
          filters: |
            src:
              - 'app/**'
              - 'src/**'
              - 'config/**'
              - '*.cabal'
              - 'stack.yaml'
              - 'package.yaml'
            deployment:
              - 'deployment/**'

  test:
    name: Run Tests
    needs:
      - check_paths
    if: ${{ needs.check_paths.outputs.code-changed == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Haskell
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: ""
          enable-stack: true
          stack-version: "latest"

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.stack
            .stack-work
          key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml.lock', 'package.yaml') }}
          restore-keys: |
            ${{ runner.os }}-stack-

      - name: Install dependencies
        run: stack build --only-dependencies --fast

      - name: Build project
        run: stack build --fast

  validate_templates:
    name: Validate Helm Templates
    needs:
      - check_paths
    if: ${{ needs.check_paths.outputs.deployment-changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: source

      - name: Check out GitOps repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nikitaDanilenko/git-ops
          path: git-ops
          sparse-checkout: pubquiz

      - name: Copy templates to GitOps structure
        run: |
          # Caveat: This step needs to be in sync with the actual step during publishing
          #         to provide a correct validation.
          GITOPS_DIR="git-ops/pubquiz"
          SOURCE_DIR="source/deployment"

          mkdir -p "$GITOPS_DIR/templates/backend" "$GITOPS_DIR/templates/postgres"

          cp "$SOURCE_DIR/templates/_helpers.tpl" "$GITOPS_DIR/templates/_helpers.tpl"

          rsync -av --delete "$SOURCE_DIR/templates/backend/" "$GITOPS_DIR/templates/backend/"
          rsync -av --delete "$SOURCE_DIR/templates/postgres/" "$GITOPS_DIR/templates/postgres/"

      - name: Validate Helm template
        run: helm template git-ops/pubquiz --name-template pubquiz --namespace pubquiz > /dev/null

  test_status:
    name: Test
    needs:
      - test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test result
        run: |
          if [[ "${{ needs.test.result }}" == "success" ]]; then
            echo "Tests passed"
          elif [[ "${{ needs.test.result }}" == "skipped" ]]; then
            echo "Tests skipped (no relevant changes)"
          else
            echo "Tests failed"
            exit 1
          fi

  validation_status:
    name: Template Validation
    needs:
      - validate_templates
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check template validation result
        run: |
          if [[ "${{ needs.validate_templates.result }}" == "success" ]]; then
            echo "Template validation passed"
          elif [[ "${{ needs.validate_templates.result }}" == "skipped" ]]; then
            echo "Template validation skipped (no relevant changes)"
          else
            echo "Template validation failed"
            exit 1
          fi

name: Build and Publish
on:
  push:
    branches:
      - "main"

jobs:
  determine_changes:
    name: Determine Changes and Version
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.semantic-version.outputs.version_tag }}
      version: ${{ steps.semantic-version.outputs.version }}
      paths-changed: ${{ steps.paths.outputs.src }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Depth setting is necessary for the semantic-version action.
        with:
          fetch-depth: 0
      - name: Determine version
        id: semantic-version
        uses: paulhatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
        with:
          # Since version 6.0.0, the action uses conventional commits.
          major_pattern: "/(major)/i"
          minor_pattern: "/(minor)/i"
      - name: Check changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: paths
        with:
          filters: |
            src:
              - 'app/**'
              - 'src/**'
              - 'config/**'
              - '*.cabal'
              - 'stack.yaml'
              - 'package.yaml'
              - 'Dockerfile'

  create_new_release:
    needs:
      - determine_changes
    name: Create New Release
    runs-on: ubuntu-latest
    if: ${{ needs.determine_changes.outputs.paths-changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Publish new release
        shell: bash
        run: |
          git tag ${{ needs.determine_changes.outputs.version-tag }} ${{ github.sha }}
          git push origin ${{ needs.determine_changes.outputs.version-tag }}
          echo ${{ secrets.GITHUB_TOKEN }} | gh auth login --with-token
          gh release create ${{ needs.determine_changes.outputs.version-tag }} --generate-notes --verify-tag

  build_and_publish:
    needs:
      - determine_changes
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    # The output is a string, hence the string comparison.
    if: ${{ needs.determine_changes.outputs.paths-changed == 'true' }}
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Set metadata
        id: metadata
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: nikitadanilenko/pubquiz-server
          tags: |
            type=sha
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.determine_changes.outputs.version-tag }}
      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_gitops:
    needs:
      - determine_changes
      - build_and_publish
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ github.workspace }}/source

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ vars.GITOPS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.GITOPS_BOT_PRIVATE_KEY }}
          owner: nikitaDanilenko
          repositories: git-ops

      - name: Check out GitOps repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nikitaDanilenko/git-ops
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops

      - name: Update templates and image tag
        run: |
          # Careful: The target is called 'pubquiz' in GitOps, because it contains the entire application.
          GITOPS_DIR="${{ github.workspace }}/git-ops/pubquiz"
          SOURCE_DIR="${{ github.workspace }}/source/deployment/pubquiz-server"

          # Ensure target directories exist
          mkdir -p "$GITOPS_DIR/templates/backend" "$GITOPS_DIR/templates/postgres"

          # Sync backend and postgres templates (deletes removed files)
          rsync -av --delete "$SOURCE_DIR/templates/backend/" "$GITOPS_DIR/templates/backend/"
          rsync -av --delete "$SOURCE_DIR/templates/postgres/" "$GITOPS_DIR/templates/postgres/"

          # Update image tag in GitOps values.yaml
          VERSION="${{ needs.determine_changes.outputs.version }}"
          yq -i ".backend.image.tag = \"$VERSION\"" "$GITOPS_DIR/values.yaml"

      - name: Determine commit title
        id: commit
        run: echo "title=$(echo '${{ github.event.head_commit.message }}' | head -n 1)" >> $GITHUB_OUTPUT

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          branch: deploy/pubquiz-server-${{ needs.determine_changes.outputs.version }}
          delete-branch: true
          title: "Deploy `pubquiz-server:${{ needs.determine_changes.outputs.version }}`"
          body: |
            Automated deployment PR for `pubquiz-server`.

            **Version:** `${{ needs.determine_changes.outputs.version }}`
            **Triggered by:** [${{ steps.commit.outputs.title }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          commit-message: "Update pubquiz-server to ${{ needs.determine_changes.outputs.version }}"
          labels: |
            deployment
            automated

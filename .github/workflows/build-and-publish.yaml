name: Build and Publish
on:
  push:
    branches:
      - "main"

permissions:
  contents: read

concurrency:
  group: build-and-publish
  cancel-in-progress: false
  queue: max

jobs:
  determine_changes:
    name: Determine Changes and Version
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.semantic-version.outputs.version_tag }}
      version: ${{ steps.semantic-version.outputs.version }}
      paths-changed: ${{ steps.paths.outputs.src }}
      deployment-changed: ${{ steps.paths.outputs.deployment }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Depth setting is necessary for the semantic-version action.
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Determine version
        id: semantic-version
        uses: paulhatch/semantic-version@9f72830310d5ed81233b641ee59253644cd8a8fc # v6.0.2
        with:
          # Since version 6.0.0, the action uses conventional commits.
          major_pattern: "/(major)/i"
          minor_pattern: "/(minor)/i"
      - name: Check changed paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: paths
        with:
          filters: |
            src:
              - 'app/**'
              - 'src/**'
              - 'config/**'
              - '*.cabal'
              - 'stack.yaml'
              - 'package.yaml'
              - 'Dockerfile'
            deployment:
              - 'deployment/**'

  create_new_release:
    needs:
      - determine_changes
    name: Create New Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ needs.determine_changes.outputs.paths-changed == 'true' }}
    steps:
      - name: Publish new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VERSION_TAG: ${{ needs.determine_changes.outputs.version-tag }}
          TARGET_SHA: ${{ github.sha }}
        run: gh release create "$VERSION_TAG" --target "$TARGET_SHA" --generate-notes

  # There is no need for this job in CI, but PRs benefit from an existing cache, because they can use the cache from the main branch.
  warm_cache:
    needs:
      - determine_changes
    name: Warm Stack Cache
    runs-on: ubuntu-latest
    if: ${{ needs.determine_changes.outputs.paths-changed == 'true' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build dependencies
        uses: freckle/stack-action@acc59ce470bb6f7b20e1469d6c520a1b27a36818 # v5.7.17
        with:
          test: false
          stack-build-arguments: --fast --no-haddock --no-library-profiling
          cache-save-always: true

  build_and_publish:
    needs:
      - determine_changes
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    # The output is a string, hence the string comparison.
    if: ${{ needs.determine_changes.outputs.paths-changed == 'true' }}
    env:
      DOCKER_BUILD_SUMMARY: false
      DOCKER_BUILD_RECORD_UPLOAD: false
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Set metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: nikitadanilenko/pubquiz-server
          tags: |
            type=sha
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ needs.determine_changes.outputs.version-tag }}
      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update_gitops:
    needs:
      - determine_changes
      - build_and_publish
    if: always() && (needs.determine_changes.outputs.deployment-changed == 'true' || needs.determine_changes.outputs.paths-changed == 'true')
    name: Update GitOps Repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ${{ github.workspace }}/source
          persist-credentials: false

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GITOPS_BOT_CLIENT_ID }}
          private-key: ${{ secrets.GITOPS_BOT_PRIVATE_KEY }}
          owner: nikitaDanilenko
          repositories: git-ops
          permission-contents: write
          permission-pull-requests: write

      - name: Check out GitOps repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: nikitaDanilenko/git-ops
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          persist-credentials: false

      - name: Update templates and image tag
        env:
          VERSION: ${{ needs.determine_changes.outputs.version }}
          BUILD_SUCCEEDED: ${{ needs.build_and_publish.result == 'success' }}
        run: |
          # Careful: The target is called 'pubquiz' in GitOps, because it contains the entire application.
          GITOPS_DIR="${{ github.workspace }}/git-ops/pubquiz"
          SOURCE_DIR="${{ github.workspace }}/source/deployment"

          # Preserve the existing backend image tag when no new image was built this run
          # (e.g. deployment-only changes). Otherwise the gitops manifest would point at a
          # tag for which no image exists.
          if [ "$BUILD_SUCCEEDED" = "true" ]; then
            BACKEND_TAG="$VERSION"
          elif [ -f "$GITOPS_DIR/values.yaml" ]; then
            BACKEND_TAG=$(yq -r '.backend.image.tag' "$GITOPS_DIR/values.yaml")
          else
            BACKEND_TAG="latest"
          fi

          # Ensure target directories exist
          mkdir -p "$GITOPS_DIR/templates/backend" "$GITOPS_DIR/templates/postgres"

          # Sync _helpers.tpl (shared template definitions)
          cp "$SOURCE_DIR/templates/_helpers.tpl" "$GITOPS_DIR/templates/_helpers.tpl"

          # Sync backend and postgres templates (deletes removed files)
          rsync -av --delete "$SOURCE_DIR/templates/backend/" "$GITOPS_DIR/templates/backend/"
          rsync -av --delete "$SOURCE_DIR/templates/postgres/" "$GITOPS_DIR/templates/postgres/"

          # Update image tag in GitOps values.yaml
          export BACKEND_TAG
          yq -i '.backend.image.tag = env(BACKEND_TAG)' "$GITOPS_DIR/values.yaml"

      - name: Determine commit title
        id: commit
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          {
            echo "title<<EOF"
            printf '%s\n' "$COMMIT_MSG" | head -n 1
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: ${{ github.workspace }}/git-ops
          branch: deploy/pubquiz-server-${{ needs.determine_changes.outputs.version }}
          delete-branch: true
          title: "Deploy `pubquiz-server:${{ needs.determine_changes.outputs.version }}`"
          body: |
            Automated deployment PR for `pubquiz-server`.

            **Version:** `${{ needs.determine_changes.outputs.version }}`
            **Triggered by:** [${{ steps.commit.outputs.title }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          commit-message: "Update pubquiz-server to ${{ needs.determine_changes.outputs.version }}"
          labels: |
            deployment
            automated
